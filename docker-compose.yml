services:
  rabbit-encoder:
    image: rabbitcompany/rabbit-encoder:latest
    container_name: rabbit-encoder
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./input:/data/input
      - ./output:/data/output
      - ./temp:/data/temp
      # Mount your media library folders for in-place encoding
      # - /mnt/HDD/media/Animes:/data/library/Animes
      # - /mnt/HDD/media/Shows:/data/library/Shows
      # - /mnt/HDD/media/Movies:/data/library/Movies
    environment:
      # Server
      - PORT=3000
      - PASSWORD=rabbitencoder

      # File watcher
      # Seconds the file size must stay unchanged before encoding starts
      - FILE_COOLDOWN=30

      # Encoder defaults
      # Video quality: low, medium, high
      - ENCODER_QUALITY=medium
      # Encoder speed: slower, slow, medium, fast, faster
      - ENCODER_SPEED=slow

      # Audio bitrates (kbps per channel layout)
      - AUDIO_BITRATE_MONO=64
      - AUDIO_BITRATE_STEREO=128
      - AUDIO_BITRATE_2_1=160
      - AUDIO_BITRATE_5_1=256
      - AUDIO_BITRATE_6_1=320
      - AUDIO_BITRATE_7_1=384
      - AUDIO_BITRATE_7_1_4=512

      # Metadata
      - ORGANIZATION=RabbitCompany
      - CONTACT=https://rabbit-company.com

      # Paths (usually no need to change)
      - INPUT_DIR=/data/input
      - OUTPUT_DIR=/data/output
      - TEMP_DIR=/data/temp

      # Library directories (comma-separated paths inside the container)
      # These folders are browsable from the UI for in-place re-encoding.
      # The encoded file replaces the source and Jellyfin metadata (.nfo, thumbnails) is cleaned up.
      # Files already ending with -{ORGANIZATION}.mkv are recognized as already encoded and skipped.
      # - LIBRARY_DIRS=/data/library/Animes,/data/library/Shows,/data/library/Movies
