<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rabbit Encoder</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="app">
			<header class="header">
				<div class="header-left">
					<div class="header-text">
						<h1>Rabbit Encoder</h1>
						<span class="subtitle">AV1 · Opus · Auto-Boost-Essential</span>
					</div>
				</div>
				<div class="header-right">
					<button class="btn btn-ghost" id="open-settings-btn">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<circle cx="12" cy="12" r="3" />
							<path
								d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
							/>
						</svg>
						Defaults
					</button>
				</div>
			</header>

			<main class="main">
				<div id="empty-state" class="empty-state"></div>
				<div id="jobs-list" class="jobs-list" style="display: none"></div>
			</main>

			<!-- Settings Modal -->
			<div id="settings-modal" class="modal-overlay" style="display: none">
				<div class="modal">
					<div class="modal-header">
						<h2>Default Settings</h2>
						<button class="btn-close" id="close-settings-btn">&times;</button>
					</div>
					<div class="modal-body">
						<div class="setting-group">
							<label>Video Quality</label>
							<div class="radio-group" id="default-quality"></div>
						</div>
						<div class="setting-group">
							<label>Encoder Speed</label>
							<div class="radio-group" id="default-speed"></div>
						</div>
						<div class="setting-group">
							<label>Audio Bitrates (kbps)</label>
							<div class="bitrate-grid" id="default-bitrates"></div>
						</div>
					</div>
					<div class="modal-footer">
						<p class="modal-note">Defaults apply to newly queued files only. Change per-file settings on each job card.</p>
					</div>
				</div>
			</div>

			<!-- Job Settings Modal -->
			<div id="job-modal" class="modal-overlay" style="display: none">
				<div class="modal">
					<div class="modal-header">
						<h2 id="job-modal-title">Job Settings</h2>
						<button class="btn-close" id="close-job-modal-btn">&times;</button>
					</div>
					<div class="modal-body">
						<div class="setting-group">
							<label>Video Quality</label>
							<div class="radio-group" id="job-quality"></div>
						</div>
						<div class="setting-group">
							<label>Encoder Speed</label>
							<div class="radio-group" id="job-speed"></div>
						</div>
						<div class="setting-group">
							<label>Audio Bitrates (kbps)</label>
							<div class="bitrate-grid" id="job-bitrates"></div>
						</div>
					</div>
					<div class="modal-footer">
						<button class="btn btn-primary" id="save-job-settings-btn">Save</button>
					</div>
				</div>
			</div>
		</div>

		<script type="module" src="app.js"></script>
	</body>
</html>
